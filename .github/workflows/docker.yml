name: Docker

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build Docker image
        run: docker build --file Dockerfile --tag sacs-study-abroad:${{ github.sha }} .
